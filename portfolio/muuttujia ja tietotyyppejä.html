<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="keywords" content="menesivulle, omatsivut, sisältöä">
    <meta name="author" content="Tomas Tsiopoulos">
    <meta name="description" content="Parhain weppisivu">
    <meta charset="UTF-8">
    <link rel="icon" href="../icon.png" type="image/jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muuttujia ja tietotyyppejä</title>
    <link rel="stylesheet" href="style.css">
    <script src="muuttujia ja tietotyyppejä.js" defer></script>
</head>
<body>

    <aside>
        <h1>Muuttujia ja tietotyyppejä</h1>
    </aside>
    <main>
        <section>
            <h3>Muuttujat</h3>
            <br>
            <button onclick="summa()">Summa</button>
            <br>
            <br>
            <button onclick="vahennys()">Vähennys</button>
            <br>
            <br>
            <button onclick="kerto()">Kerto</button>
            <br>
            <br>
            <button onclick="jako()">Jako</button>
         </section>
       
         <section>
            <h3>Laskin</h3>
            <br>
            <input id="numero1" type="number" placeholder="Eka numero">
            <input id="numero2" type="number" placeholder="Toka numero">

            <button onclick="laskin_summa()">+</button>
            <button onclick="laskin_vahennys()">-</button>
            <button onclick="laskin_kerto()">*</button>
            <button onclick="laskin_jako()">/</button>
<br>
<br>

            <details style="color:white;">
                <summary>Päivämäärä</summary>
            
            <button onclick="naytaAika()" style="padding: 15px; background-color: white; color: black; font-family: calibri; font-size: 16px; border-radius: 10px;">Näytä päivämäärä ja aika</button>

            <div id="paivamaara"></div>
            <div id="aika"></div>
            <div id="paivaJaAika"></div>
            <div id="viikonpaiva"></div>
            <div id="kuukausi"></div>
            </details>
         </section>

         <section id="Veijo" style="color: white;">
            <h2>Veijo</h2>
            <ul id="v"></ul>
         </section>

         <section id="Elvira" style="color: white;">
            <h2>Elvira</h2>
            <ul id="e"></ul>
         </section>

         <section id="Mehdi" style="color: white;">
            <h2>Mehdi</h2>
            <ul id="m"></ul>
         </section>

         <section id="Tuuli" style="color: white;">
            <h2>Tuuli</h2>
            <ul id="t"></ul>
         </section>

         <ul id="veijotuuli" style="color: white;"></ul>
         <ul id="mehdielvira" style="color: white;"></ul>
         <ul id="elviratuuli" style="color: white;"></ul>
         
    </main>

<nav>
    <h3>Navigaatio</h3>

    <a style="color: white; position: fixed;" href="index.html"><strong>/ Takaisin pääsivulle /</strong></a>
</nav>
