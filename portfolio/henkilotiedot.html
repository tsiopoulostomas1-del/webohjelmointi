<!DOCTYPE html>
<html lang="en">
<head>
      <meta name="keywords" content="menesivulle, omatsivut, sisältöä">
    <meta name="author" content="Tomas Tsiopoulos">
    <meta name="description" content="Parhain weppisivu">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henkilötiedot</title>
    <script src="henkilotiedot.js" defer></script>
</head>
<body>
    <aside>
        <h1>Henkilötiedot</h1>
    </aside>
    
<main>
    <table style="color: white;">
        <thead>
            <tr>
                <th>Nimi</th>
                <th>Ikä</th>
                <th>Työ</th>
                <th>Ajokortti</th>
            </tr>
        </thead>
        <tbody id="rivit">
        </tbody>
    </table>

        <!-- UUSI LOMAKE TAULUKON ALLE -->
        <form id="lomake" style="margin-top: 20px; color: white;">
        <h3>Lisää uusi henkilö</h3>

        <label>Nimi:</label><br>
        <input type="text" id="nimi"><br><br>

        <label>Ikä:</label><br>
        <input type="number" id="ika"><br><br>

        <label>Työ:</label><br>
        <input type="text" id="tyo"><br><br>

        <label>
            <input type="checkbox" id="ajokortti">
            Ajokortti
        </label><br><br>

        <button type="button" id="laheta">Lähetä</button>
    </form>
</main>

<nav>
    <a href="index.html"><strong>/ Takaisin pääsivulle / </strong></a>
</nav>
  

</body>
</html>
